<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Calculadora Golden MiniBits</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#f5f5f5;
    margin:0;
    padding:20px;
}

.tarjeta{
    max-width:500px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 4px 15px rgba(0,0,0,.1);
    text-align:center;
}

h1{
    color:#2e7d32;
    margin-bottom:10px;
}

p{
    color:#555;
}

input{
    width:100%;
    padding:12px;
    font-size:18px;
    margin-top:10px;
    border:1px solid #ccc;
    border-radius:8px;
    box-sizing:border-box;
}

button{
    width:100%;
    margin-top:15px;
    padding:12px;
    font-size:18px;
    border:none;
    border-radius:8px;
    background:#2e7d32;
    color:white;
    cursor:pointer;
}

button:hover{
    opacity:.9;
}

#resultado{
    margin-top:25px;
    font-size:18px;
    line-height:1.8;
    text-align:left;
}

</style>
</head>

<body>

<div class="tarjeta">

<h1>🐶 Golden Carne Razas Pequeñas MiniBits</h1>

<p>Ingrese el peso de su mascota (kg)</p>

<input
type="number"
id="peso"
step="0.1"
min="0.5"
placeholder="Ejemplo: 5">

<button onclick="calcular()">
Calcular
</button>

<div id="resultado"></div>

</div>

<script>

function calcular(){

    let peso = parseFloat(document.getElementById("peso").value);

    if(isNaN(peso) || peso <= 0){

        document.getElementById("resultado").innerHTML =
        "⚠️ Ingrese un peso válido.";

        return;
    }

    let gramos = peso * 30;

    let dias3kg = 3000 / gramos;

    let dias15kg = 15000 / gramos;

    document.getElementById("resultado").innerHTML =
        "<strong>Resultado:</strong><br><br>" +

        "🐾 Peso: <strong>" +
        peso.toFixed(1) +
        " kg</strong><br><br>" +

        "🍖 Cantidad diaria recomendada:<br>" +
        "<strong>" +
        gramos.toFixed(0) +
        " g/día</strong><br><br>" +

        "📦 Una funda de 3 kg dura aproximadamente:<br>" +
        "<strong>" +
        dias3kg.toFixed(0) +
        " días</strong><br><br>" +

        "📦 Una funda de 15 kg dura aproximadamente:<br>" +
        "<strong>" +
        dias15kg.toFixed(0) +
        " días</strong>";
}

</script>

</body>
</html>
